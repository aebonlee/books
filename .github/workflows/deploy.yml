name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Build
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="https://hcmgdztsgjvzcyxyayaj.supabase.co"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="sb_publishable_vYCKlU2lbPkXpUDj1sILow_DskJCRVS"
          export NEXT_PUBLIC_IMP_CODE="imp61949262"
          export NEXT_PUBLIC_PG_PROVIDER="html5_inicis.MOIkorcom1"
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
