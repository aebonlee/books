name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Build
        run: |
          # secrets가 설정된 경우에만 env override (미설정 시 .env.production 값 사용)
          if [ -n "$_SUPABASE_URL" ]; then export NEXT_PUBLIC_SUPABASE_URL="$_SUPABASE_URL"; fi
          if [ -n "$_SUPABASE_KEY" ]; then export NEXT_PUBLIC_SUPABASE_ANON_KEY="$_SUPABASE_KEY"; fi
          if [ -n "$_IMP_CODE" ]; then export NEXT_PUBLIC_IMP_CODE="$_IMP_CODE"; fi
          if [ -n "$_PG_PROVIDER" ]; then export NEXT_PUBLIC_PG_PROVIDER="$_PG_PROVIDER"; fi
          npm run build
        env:
          _SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          _SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          _IMP_CODE: ${{ secrets.NEXT_PUBLIC_IMP_CODE }}
          _PG_PROVIDER: ${{ secrets.NEXT_PUBLIC_PG_PROVIDER }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
